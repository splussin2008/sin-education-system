server {
    server_name splus-sin.com www.splus-sin.com;
    root /var/www/wordpress;
    index index.php index.html index.htm;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/var/run/php/php8.3-fpm.sock;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/splus-sin.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/splus-sin.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = splus-sin.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name splus-sin.com www.splus-sin.com;
    return 404; # managed by Certbot
}
